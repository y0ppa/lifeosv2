<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset password — Brain</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="stylesheet" href="assets/css/jarvis-ui.css">
<style>
  .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--sp-4); }
  .auth-card { width: 100%; max-width: 400px; }
  .auth-error { font-size: 13px; color: var(--accent-red); background: var(--accent-red-soft); border-radius: var(--r-sm); padding: var(--sp-3); display: none; margin-bottom: var(--sp-4); }
  .auth-success { font-size: 13px; color: var(--accent-green); background: var(--accent-green-soft); border-radius: var(--r-sm); padding: var(--sp-3); display: none; margin-bottom: var(--sp-4); }
</style>
</head>
<body data-page="reset-password">
<div class="auth-shell">
  <div class="auth-card">
    <div class="panel panel-pad">
      <h1 class="page-title" style="font-size:19px;margin-bottom:4px">Set a new password</h1>
      <p class="page-sub" style="margin-bottom:var(--sp-4)">This link is single-use and expires after a short time.</p>

      <p class="auth-error" id="auth-error" role="alert"></p>
      <p class="auth-success" id="auth-success" role="status"></p>

      <form id="reset-form">
        <div class="field" style="margin-bottom:var(--sp-3)">
          <label for="new-password">New password</label>
          <input id="new-password" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <div class="field" style="margin-bottom:var(--sp-4)">
          <label for="confirm-password">Confirm new password</label>
          <input id="confirm-password" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="reset-submit-btn">Update password</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase-config.js" onerror="console.warn('supabase-config.js not found.')"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/auth.js"></script>
<script>
(function () {
  var errorEl = document.getElementById('auth-error');
  var successEl = document.getElementById('auth-success');
  var submitBtn = document.getElementById('reset-submit-btn');

  if (!window.Brain.isSupabaseConfigured) {
    errorEl.textContent = 'Supabase is not configured yet.';
    errorEl.style.display = 'block';
    submitBtn.disabled = true;
  } else {
    // Supabase JS detects the recovery token in the URL automatically
    // (detectSessionInUrl: true) and establishes a temporary session.
    Brain.Auth.getSession().then(function (session) {
      if (!session) {
        errorEl.textContent = 'This reset link is invalid or has expired. Request a new one from the sign-in page.';
        errorEl.style.display = 'block';
        submitBtn.disabled = true;
      }
    });
  }

  document.getElementById('reset-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var pw = document.getElementById('new-password').value;
    var confirm = document.getElementById('confirm-password').value;
    if (pw !== confirm) {
      errorEl.textContent = 'Passwords do not match.';
      errorEl.style.display = 'block';
      successEl.style.display = 'none';
      return;
    }
    submitBtn.classList.add('btn-loading');
    submitBtn.disabled = true;
    Brain.Auth.updatePassword(pw).then(function (res) {
      submitBtn.classList.remove('btn-loading');
      if (res.error) {
        submitBtn.disabled = false;
        errorEl.textContent = res.error.message;
        errorEl.style.display = 'block';
        return;
      }
      successEl.textContent = 'Password updated. Redirecting you to sign in…';
      successEl.style.display = 'block';
      errorEl.style.display = 'none';
      setTimeout(function () {
        Brain.Auth.signOut().then(function () { window.location.replace('login.html'); });
      }, 1500);
    });
  });
})();
</script>
</body>
</html>
